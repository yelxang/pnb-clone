<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Philippine National Bank</title>
  <link rel="icon" href="pnblogotab.png">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="nav">
    <div class="brand">
      <img src="pnblogo.png" alt="PNB Logo" class="logo">
    </div>
    <nav class="nav-links">
      <a href="#">PERSONAL</a>
      <a href="#">CORPORATE</a>
      <a href="#">ABOUT US</a>
      <a href="#">CONTACT US</a>
      <button class="icon-btn" aria-label="Search">⌕</button>
      <button class="icon-btn" aria-label="Menu">☰</button>
    </nav>
  </header>
  
  <main class="hero">
    <section class="hero-left">
      <p class="kicker">Over a century of trust with Filipinos worldwide</p>
      <h1 class="headline">
        Every Step <br>
        Together <br>
        <span class="accent">with PNB</span>
      </h1>
      <a href="https://www.pnb.com.ph/product-comparison/?card=148" class="cta">
        CHOOSE FROM OUR PRODUCTS <span class="arrow">›</span>
      </a>
    </section>
    <section class="hero-right">
      <div class="login-card">
        <h2>Log in</h2>
        <p class="sub">Access your account securely</p>
        <form id="login-form">
          <label for="email">Email / Username</label>
          <input
            id="email"
            type="text"
            placeholder="Enter email or username"
            required>
          <label for="pass">Password</label>
          <input
            id="pass"
            type="password"
            placeholder="Enter password"
            required>
          <div class="row">
            <label class="check">
              <input type="checkbox">
              Remember me
            </label>
            <a class="link" href="#">Forgot password?</a>
          </div>
          <button type="submit" class="login-btn">
            LOGIN
          </button>
        </form>
      </div>
    </section>
  </main>
  <div id="success-message" class="success-message">
    ✔ Login successful!
  </div>
  <script src="script.js"></script>
</body>
</html>
